<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Chess - ChessArena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white font-['Inter'] min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-8">
                    <a href="index.html" class="flex-shrink-0 flex items-center gap-2 cursor-pointer hover:opacity-80 transition">
                        <i data-lucide="crown" class="h-8 w-8 text-amber-500"></i>
                        <span class="text-xl font-bold bg-gradient-to-r from-amber-500 to-orange-600 bg-clip-text text-transparent">
                            ChessArena
                        </span>
                    </a>
                    <div class="hidden md:flex items-center gap-6">
                        <a href="index.html" class="text-gray-300 hover:text-white font-medium transition flex items-center gap-2">
                            <i data-lucide="home" class="w-4 h-4"></i> Home
                        </a>
                        <button class="text-white font-medium transition flex items-center gap-2 bg-gray-700 px-3 py-1.5 rounded-lg">
                            <i data-lucide="play" class="w-4 h-4"></i> Play
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2" onclick="game.newGame()">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        New Game
                    </button>
                    <a href="index.html" class="text-gray-400 hover:text-white transition">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            
            <!-- Left Sidebar - Game Info -->
            <div class="lg:col-span-3 space-y-4 order-2 lg:order-1">
                <!-- Player 2 (Black) -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center">
                            <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-200">Opponent</div>
                            <div class="text-sm text-gray-500">Black • 1500 ELO</div>
                        </div>
                        <div class="text-xl font-mono font-bold text-gray-400" id="timer-black">10:00</div>
                    </div>
                    <div class="mt-3 flex flex-wrap gap-1" id="captured-white"></div>
                </div>

                <!-- Game Status -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-semibold text-gray-200 flex items-center gap-2">
                            <i data-lucide="activity" class="w-4 h-4 text-green-500"></i>
                            Game Status
                        </h3>
                        <span id="turn-indicator" class="text-xs px-2 py-1 rounded-full bg-green-900 text-green-300 font-medium">
                            White's Turn
                        </span>
                    </div>
                    <div class="space-y-2">
                        <button onclick="game.flipBoard()" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg font-medium transition flex items-center justify-center gap-2">
                            <i data-lucide="flip-vertical" class="w-4 h-4"></i>
                            Flip Board
                        </button>
                        <button onclick="game.undoMove()" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg font-medium transition flex items-center justify-center gap-2">
                            <i data-lucide="undo-2" class="w-4 h-4"></i>
                            Undo Move
                        </button>
                    </div>
                </div>

                <!-- Move History -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg flex-1 min-h-[200px]">
                    <h3 class="font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <i data-lucide="history" class="w-4 h-4 text-blue-500"></i>
                        Move History
                    </h3>
                    <div id="move-history" class="font-mono text-sm text-gray-400 h-48 overflow-y-auto space-y-1 pr-2">
                        <!-- Moves will be inserted here -->
                    </div>
                </div>

                <!-- Mode-specific Info -->
                <div id="mode-info" class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg hidden">
                    <h3 class="font-semibold text-gray-200 mb-2 flex items-center gap-2">
                        <i data-lucide="trophy" class="w-4 h-4 text-yellow-500"></i>
                        <span id="mode-title">Game Mode</span>
                    </h3>
                    <div id="mode-stats" class="space-y-2 text-sm">
                        <!-- Mode specific stats inserted here -->
                    </div>
                </div>

                <!-- Player 1 (White) -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-900 flex items-center justify-center">
                            <i data-lucide="user" class="w-5 h-5 text-blue-300"></i>
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-200">You</div>
                            <div class="text-sm text-gray-500">White • 1500 ELO</div>
                        </div>
                        <div class="text-xl font-mono font-bold text-white" id="timer-white">10:00</div>
                    </div>
                    <div class="mt-3 flex flex-wrap gap-1" id="captured-black"></div>
                </div>
            </div>

            <!-- Center - Chess Board -->
            <div class="lg:col-span-6 order-1 lg:order-2 flex flex-col items-center justify-center">
                <div class="relative w-full max-w-[600px] aspect-square">
                    <!-- Board Container -->
                    <div id="chess-board" class="w-full h-full bg-gray-800 rounded-lg shadow-2xl border-4 border-gray-700 overflow-hidden grid grid-cols-8 grid-rows-8">
                        <!-- Squares generated by JS -->
                    </div>
                    
                    <!-- Game Over Modal -->
                    <div id="game-over-modal" class="absolute inset-0 bg-gray-900/90 backdrop-blur-sm rounded-lg hidden items-center justify-center flex-col z-20">
                        <div class="text-6xl mb-4" id="winner-icon">👑</div>
                        <h2 class="text-3xl font-bold text-white mb-2" id="winner-text">White Wins!</h2>
                        <p class="text-gray-400 mb-6" id="win-reason">Checkmate</p>
                        <button onclick="game.newGame()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-bold text-lg transition transform hover:scale-105">
                            Play Again
                        </button>
                    </div>
                </div>

                <!-- Coordinates Legend -->
                <div class="flex justify-between w-full max-w-[600px] mt-2 px-1 text-xs text-gray-500 font-mono">
                    <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
                </div>
            </div>

            <!-- Right Sidebar - Controls & Analysis -->
            <div class="lg:col-span-3 space-y-4 order-3">
                <!-- Analysis Panel -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg">
                    <h3 class="font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 text-purple-500"></i>
                        Analysis
                    </h3>
                    <div class="h-32 bg-gray-900 rounded-lg flex items-end justify-center gap-1 p-2 mb-3">
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 40%"></div>
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 55%"></div>
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 45%"></div>
                        <div class="w-8 bg-blue-600 rounded-t" style="height: 65%"></div>
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 50%"></div>
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 60%"></div>
                        <div class="w-8 bg-gray-700 rounded-t" style="height: 48%"></div>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Evaluation</span>
                        <span class="text-green-400 font-mono font-bold">+0.8</span>
                    </div>
                </div>

                <!-- Quick Settings -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg">
                    <h3 class="font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <i data-lucide="settings" class="w-4 h-4 text-gray-400"></i>
                        Settings
                    </h3>
                    <div class="space-y-3">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm text-gray-400">Show Legal Moves</span>
                            <input type="checkbox" id="show-hints" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-600 focus:ring-blue-500">
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm text-gray-400">Sound Effects</span>
                            <input type="checkbox" id="sound-toggle" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-600 focus:ring-blue-500">
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm text-gray-400">Board Theme</span>
                            <select id="theme-select" class="bg-gray-700 text-white text-sm rounded px-2 py-1 border border-gray-600 focus:outline-none focus:border-blue-500">
                                <option value="modern">Modern</option>
                                <option value="classic">Classic</option>
                                <option value="blue">Ocean Blue</option>
                            </select>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm text-gray-400">Game Mode</span>
                            <select id="game-mode" class="bg-gray-700 text-white text-sm rounded px-2 py-1 border border-gray-600 focus:outline-none focus:border-blue-500 w-40">
                                <option value="standard">Standard</option>
                                <option value="ai">🤖 vs AI</option>
                                <option value="chess960">Chess960</option>
                                <option value="koth">King of the Hill</option>
                                <option value="threecheck">Three-check</option>
                                <option value="horde">Horde</option>
                                <option value="atomic">Atomic</option>
                                <option value="racing">Racing Kings</option>
                                <option value="crazyhouse">Crazyhouse</option>
                            </select>
                        </label>
                    </div>
                </div>

                <!-- Chat/Notes -->
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-lg flex-1 min-h-[200px]">
                    <h3 class="font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <i data-lucide="message-square" class="w-4 h-4 text-green-500"></i>
                        Game Chat
                    </h3>
                    <div class="bg-gray-900 rounded-lg p-3 h-32 overflow-y-auto text-sm space-y-2 mb-3">
                        <div class="text-gray-500 italic">Game started. Good luck!</div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" placeholder="Send a message..." class="flex-1 bg-gray-700 text-white text-sm rounded-lg px-3 py-2 border border-gray-600 focus:outline-none focus:border-blue-500 placeholder-gray-500">
                        <button class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg transition">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        
        // Check for URL parameter to set game mode
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        if (mode) {
            const modeSelect = document.getElementById('game-mode');
            if (modeSelect) {
                modeSelect.value = mode;
                // Trigger change event to initialize game with mode
                setTimeout(() => {
                    if (game) {
                        game.gameMode = mode;
                        game.newGame();
                    }
                }, 100);
            }
        }
    </script>
</body>
</html>
